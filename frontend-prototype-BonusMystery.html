<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>神秘彩金活动 · 前台原型</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
     background:#2d2d3d;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
#shell{width:390px;max-width:100vw;height:100vh;background:#12082a;
       position:relative;display:flex;flex-direction:column;overflow:hidden}

/* 控制条 */
#ctrl{flex:0 0 auto;background:rgba(0,0,0,.92);padding:7px 12px;display:flex;
      align-items:center;gap:14px;font-size:12px;
      border-bottom:1px solid rgba(255,255,255,.1);z-index:20}
.ctrl-group{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.6)}
.ctrl-group label{white-space:nowrap}
.toggle-btn{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.18)}
.toggle-btn button{padding:4px 10px;background:transparent;border:none;
                   color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;transition:.18s}
.toggle-btn button.active{background:rgba(245,195,55,.9);color:#1a0a00;font-weight:700}

/* 滚动页面 */
#page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#page::-webkit-scrollbar{display:none}

/* 顶部导航 */
.topnav{height:44px;display:flex;align-items:center;justify-content:space-between;
        padding:0 16px;background:#12082a;position:relative}
.topnav-back{font-size:22px;color:rgba(255,255,255,.9);cursor:pointer;width:34px;
             height:34px;display:flex;align-items:center;justify-content:center}
.topnav-title{position:absolute;left:50%;transform:translateX(-50%);
              font-size:15px;font-weight:600;color:#fff;white-space:nowrap}
.topnav-right{width:34px}

/* 横幅 */
.banner-img{width:100%;display:block}

/* Tabs */
.tabs-wrap{background:#1e0f38;padding:0 10px}
.tabs{display:flex;gap:5px;padding:9px 0 0}
.tab{flex:1 1 0;min-width:56px;display:flex;flex-direction:column;align-items:center;
     gap:4px;padding:10px 8px 10px;border-radius:10px;background:#2a1648;
     cursor:pointer;position:relative;transition:.15s}
.tab .tab-icon{font-size:20px;line-height:1}
.tab .tab-label{font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap}
.tab .tab-dot{position:absolute;top:5px;right:6px;width:7px;height:7px;
              background:#ff3b30;border-radius:50%;border:1.5px solid #1e0f38}
.tab.active{background:#3a2060}
.tab.active .tab-label{color:#f5c540;font-weight:600}
/* 指示箭头行（tab 框外） */
.tab-inds{display:flex;gap:5px;padding:3px 0 8px}
.tab-ind{flex:1 1 0;min-width:56px;display:flex;justify-content:center;align-items:flex-start;
         height:10px}
.t-arrow{display:none}
.tab-ind.active .t-arrow{display:block;width:0;height:0;
  border-left:7px solid transparent;border-right:7px solid transparent;
  border-top:8px solid #b87a10}

/* 内容区 */
.content{padding:10px 12px 0}

/* 用户信息 */
.user-info{background:rgba(255,255,255,.07);border-radius:10px;
           padding:11px 14px;margin-bottom:10px}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:3.5px 0}
.user-row .u-label{font-size:12px;color:rgba(255,255,255,.48)}
.user-row .u-val{font-size:13px;font-weight:600;color:#fff}

/* 可领取时间框 */
.unlock-box{border-radius:12px;padding:13px 15px 16px;margin-bottom:10px;
            background:linear-gradient(150deg,#e8a820 0%,#c06808 100%);
            position:relative;overflow:hidden}
.unlock-box::before{content:'';position:absolute;inset:0;
                    background:linear-gradient(180deg,rgba(255,230,90,.14) 0%,transparent 55%)}
.ub-title{text-align:center;font-size:12px;color:rgba(255,255,255,.88);
          position:relative;z-index:1;margin-bottom:13px}
.ub-body{display:flex;justify-content:center;position:relative;z-index:1}
.ub-inner{display:inline-flex;flex-direction:column;gap:2px}
.ub-time{font-size:15px;font-weight:700;color:#fff;letter-spacing:.2px;
         margin-bottom:5px;white-space:nowrap}
.ub-prize-label{font-size:13px;color:rgba(255,255,255,.92);margin-bottom:2px}
.ub-prize-amt{display:flex;align-items:baseline;gap:2px}
.ub-currency{font-size:12px;font-weight:500;color:#fff}
.ub-amount{font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)}

/* 档位表 */
.tier-section{margin-bottom:10px}
.tier-table{width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden}
.tier-table th{background:#2a1648;font-size:11px;font-weight:500;
               color:rgba(255,255,255,.55);padding:8px 0;text-align:center}
.tier-table td{background:rgba(255,255,255,.04);font-size:11px;
               color:rgba(255,255,255,.72);padding:8px 0;text-align:center;
               border-top:1px solid rgba(255,255,255,.05)}
.tier-table tr:nth-child(even) td{background:rgba(255,255,255,.08)}

/* 规则 */
.rules{background:rgba(255,255,255,.04);border-radius:10px;padding:11px 13px;
       margin-bottom:80px;font-size:12px;color:rgba(255,255,255,.48);line-height:1.9}
.rules h4{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:5px;font-weight:600}

/* 底部按钮 */
.btn-bar{position:absolute;bottom:0;left:0;right:0;
         background:linear-gradient(180deg,transparent 0%,#12082a 35%);
         padding:8px 18px 22px;z-index:10}
.main-btn{width:100%;height:50px;border:none;border-radius:25px;font-size:16px;
          font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.5px}
.main-btn.active-btn{background:linear-gradient(135deg,#f5c540 0%,#df8808 100%);
                     color:#fff;box-shadow:0 4px 18px rgba(220,140,8,.5)}
.main-btn.gray-btn{background:#2a1a42;color:rgba(255,255,255,.3);cursor:default}

/* 弹框遮罩 */
.overlay{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,.65);
         display:flex;align-items:center;justify-content:center;
         opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.show{opacity:1;pointer-events:all}

/* 成功弹框 */
.congrats-modal{background:#fff;border-radius:20px;width:300px;overflow:hidden;
                text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.congrats-modal .c-img{width:300px;display:block;height:auto}
.congrats-modal .c-body{padding:18px 24px 22px}
.congrats-modal .c-text{font-size:15px;color:#333;line-height:1.6;margin-bottom:20px}
.congrats-modal .c-amt{font-size:15px;font-weight:800;color:#e04a0a;display:inline}
.congrats-modal .c-btn{width:100%;height:46px;border:none;border-radius:23px;
                       background:linear-gradient(135deg,#f5c540,#df8808);
                       color:#fff;font-size:15px;font-weight:600;cursor:pointer}

/* 申领限制 —— 页面中部深色悬浮卡片 */
.restrict-overlay{position:absolute;inset:0;z-index:101;
                  pointer-events:none;background:transparent}
.restrict-overlay.show{pointer-events:all}
.restrict-card{position:absolute;top:315px;left:12px;right:12px;
               background:rgba(18,8,32,.96);border-radius:14px;
               padding:16px 18px;text-align:center;
               color:rgba(255,255,255,.85);font-size:13px;line-height:1.9;
               box-shadow:0 4px 28px rgba(0,0,0,.6);
               opacity:0;transform:translateY(-6px);transition:.22s;
               pointer-events:all}
.restrict-overlay.show .restrict-card{opacity:1;transform:translateY(0)}
</style>
</head>

<script>
const DAYS=[2,3,7,15,30];
const DAY_CFG={
  2: {unlock:'2026-06-17 00:00:00',dep:'R$35,00',initState:'pending',amt:'R$1,07'},
  3: {unlock:'2026-06-18 00:00:00',dep:'R$75,00',initState:'claimed',amt:'R$3,50'},
  7: {unlock:'2026-06-22 00:00:00',dep:'R$75,00',initState:'locked', amt:'R$5,00'},
  15:{unlock:'2026-06-30 00:00:00',dep:'R$75,00',initState:'locked', amt:'R$8,88'},
  30:{unlock:'2026-07-15 00:00:00',dep:'R$75,00',initState:'locked', amt:'R$15,00'},
};
const TIERS=[
  {dep:'R$30~70',       prz:'R$0,30~88,00'},
  {dep:'R$70~150',      prz:'R$0,50~188,00'},
  {dep:'R$150~300',     prz:'R$2,00~388,00'},
  {dep:'R$300~600',     prz:'R$5,00~888,00'},
  {dep:'R$600~1.000',   prz:'R$10,00~888,00'},
  {dep:'R$1.000~2.000', prz:'R$15,00~1.888,00'},
  {dep:'R$2.000~5.000', prz:'R$35,00~2.888,00'},
  {dep:'R$5.000+',      prz:'R$88,00~8.888,00'},
];

var curDay=7, isLoggedIn=true, claimResult='success';
var openTime=nowStr(); // 页面打开时刻，未登录状态下作为注册时间
var dayStates={};
DAYS.forEach(function(d){dayStates[d]=DAY_CFG[d].initState;});

function pad(n){return n<10?'0'+n:''+n;}
function nowStr(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}
function calcUnlock(dayN){
  var d=new Date();
  d.setDate(d.getDate()+dayN-1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' 00:00:00';
}

function openCongratsModal(){document.getElementById('ov-congrats').classList.add('show');}
function closeCongratsModal(){document.getElementById('ov-congrats').classList.remove('show');}
function openRestrictOverlay(){document.getElementById('restrict-overlay').classList.add('show');}
function closeRestrict(){document.getElementById('restrict-overlay').classList.remove('show');}

function setLogin(v){
  isLoggedIn=v;
  document.getElementById('btn-login').classList.toggle('active',v);
  document.getElementById('btn-nologin').classList.toggle('active',!v);
  render();
}
function setResult(v){
  claimResult=v;
  document.getElementById('btn-success').classList.toggle('active',v==='success');
  document.getElementById('btn-restrict').classList.toggle('active',v==='restrict');
  if(v==='success'){
    document.getElementById('cg-amt').textContent=DAY_CFG[curDay].amt;
    openCongratsModal();
  }else{
    openRestrictOverlay();
  }
}
function selectDay(d){curDay=d;render();}

function handleMainBtn(){
  if(!isLoggedIn)return;
  if(dayStates[curDay]!=='pending')return;
  if(claimResult==='success'){
    document.getElementById('cg-amt').textContent=DAY_CFG[curDay].amt;
    openCongratsModal();
    dayStates[curDay]='claimed';
    render();
  }else{
    openRestrictOverlay();
  }
}

function renderTabs(){
  var tabsHtml='', indHtml='';
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i],st=dayStates[d],active=d===curDay;
    tabsHtml+='<div class="tab'+(active?' active':'')+' '+st+'" onclick="selectDay('+d+')">';
    if(isLoggedIn&&st==='pending')tabsHtml+='<span class="tab-dot"></span>';
    tabsHtml+='<span class="tab-icon">🎁</span>';
    tabsHtml+='<span class="tab-label">第'+d+'天</span>';
    tabsHtml+='</div>';
    indHtml+='<div class="tab-ind'+(active?' active':'')+'"><span class="t-arrow"></span></div>';
  }
  document.getElementById('tabs').innerHTML=tabsHtml;
  document.getElementById('tab-inds').innerHTML=indHtml;
}

// 取当前活动日档位表最高奖励上限（格式化为带千分位的字符串）
function getMaxPrize(){
  var maxVal=0;
  for(var i=0;i<TIERS.length;i++){
    var prz=TIERS[i].prz; // e.g. 'R$88,00~8.888,00'
    var parts=prz.split('~');
    var raw=parts[parts.length-1].replace('R$','').replace(/\./g,'').replace(',','.');
    var val=parseFloat(raw);
    if(val>maxVal)maxVal=val;
  }
  // 格式化回 pt-BR 风格：千分位用点，小数用逗号
  var s=maxVal.toFixed(2);
  var arr=s.split('.');
  arr[0]=arr[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return arr[0]+','+arr[1];
}

function renderContent(){
  var cfg=DAY_CFG[curDay];
  var regTime=isLoggedIn?'2026-06-16 05:48:00':openTime;
  var depAmt=isLoggedIn?cfg.dep:'R$0,00';
  var unlockTime=isLoggedIn?cfg.unlock:calcUnlock(curDay);

  var userHtml='<div class="user-info">'
    +'<div class="user-row"><span class="u-label">注册时间</span><span class="u-val">'+regTime+'</span></div>'
    +'<div class="user-row"><span class="u-label">前'+curDay+'天累积充值</span><span class="u-val">'+depAmt+'</span></div>'
    +'</div>';

  var unlockHtml='<div class="unlock-box">'
    +'<div class="ub-title">可领取时间</div>'
    +'<div class="ub-body"><div class="ub-inner">'
    +'<div class="ub-time">'+unlockTime+'</div>'
    +'<div class="ub-prize-label">神秘彩金</div>'
    +'<div class="ub-prize-amt"><span class="ub-currency">R$&nbsp;</span><span class="ub-amount">'+getMaxPrize()+'</span></div>'
    /* 说明：神秘彩金金额 = 当前活动日档位表中最高奖励上限。
       各活动日若配置相同档位表，则显示相同金额（如本原型各日均为 8.888,00）。
       实际接入时，不同活动日可配置不同档位表，此处自动取该日最高档上限金额。 */
    +'</div></div></div>';

  var tierRows='';
  for(var i=0;i<TIERS.length;i++)tierRows+='<tr><td>'+TIERS[i].dep+'</td><td>'+TIERS[i].prz+'</td></tr>';
  var tierHtml='<div class="tier-section">'
    +'<table class="tier-table"><thead><tr><th>充值金额</th><th>神秘彩金</th></tr></thead>'
    +'<tbody>'+tierRows+'</tbody></table></div>';

  var rulesHtml='<div class="rules"><h4>活动规则</h4>'
    +'<p>1. 本活动仅限注册会员参与，每个活动日限领取一次。</p>'
    +'<p>2. 彩金金额根据活动日内累积充值金额随机发放，具体以到账为准。</p>'
    +'<p>3. 每个活动日解锁时间为注册当日起对应天数的00:00:00。</p>'
    +'<p>4. 彩金奖励需在7天内使用，逾期自动失效。</p>'
    +'<p>5. 本活动最终解释权归平台所有。</p>'
    +'</div>';

  document.getElementById('content').innerHTML=userHtml+unlockHtml+tierHtml+rulesHtml;
}

function renderBtn(){
  var btn=document.getElementById('main-btn');
  var st=dayStates[curDay];
  btn.textContent=isLoggedIn?'领取':'立即参与';
  btn.className='main-btn '+((!isLoggedIn||st==='pending')?'active-btn':'gray-btn');
}

function render(){renderTabs();renderContent();renderBtn();}
render();
</script>
